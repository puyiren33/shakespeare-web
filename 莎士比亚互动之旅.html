<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>莎翁奇妙物语 - 互动游戏</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0a18;--bg2:#16122e;--accent:#f0d68a;--accent2:#e8a87c;--accent3:#c76b5a;--text:#f5ede0;--text2:#a89882;--card:#1c1838;--card-hover:#282348;--shadow:rgba(0,0,0,.6);--gold:#d4a843;--pink:#f7b5c8;--sky:#a8d8ea;--green:#7db87d}
body{font-family:'ZCOOL KuaiLe','Noto Serif SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

header{position:relative;z-index:10;text-align:center;padding:16px 16px 4px;background:linear-gradient(180deg,rgba(12,10,24,.96),transparent)}
header h1{font-family:'Ma Shan Zheng',cursive;font-size:2.6em;background:linear-gradient(135deg,#f0d68a,#e8a87c,#f0d68a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px}
header .sub{font-size:.78em;color:var(--text2);margin-top:0;letter-spacing:2px}

.tabs{display:flex;justify-content:center;gap:2px;margin:4px 0 8px;position:relative;z-index:10;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border:1px solid transparent;background:transparent;color:var(--text2);border-radius:12px 12px 0 0;cursor:pointer;font-family:inherit;font-size:.76em;transition:all .3s;border-bottom:2px solid transparent}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(240,214,138,.04)}

.game-container{position:relative;z-index:10;max-width:920px;margin:0 auto;padding:0 12px 40px}
.tab-content{display:none}.tab-content.active{display:block}

.stats-bar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:2px 0 8px}
.stat{display:flex;align-items:center;gap:3px;background:var(--card);padding:3px 10px;border-radius:16px;border:1px solid rgba(255,255,255,.04);font-size:.72em;transition:all .3s}
.stat .v{color:var(--accent);font-weight:bold;min-width:12px;text-align:center;transition:all .3s}
.stat.pop .v{color:#fff;text-shadow:0 0 10px var(--accent)}

.s-dots{display:flex;justify-content:center;gap:4px;margin:3px 0 6px}
.s-dot{width:32px;height:3px;border-radius:2px;background:rgba(255,255,255,.05);transition:all .4s;cursor:pointer}
.s-dot.active{background:var(--accent);box-shadow:0 0 8px rgba(240,214,138,.25)}
.s-dot.past{background:rgba(240,214,138,.15)}

/* ---- SD Character ---- */
.char-main{display:flex;align-items:center;justify-content:center;gap:20px;margin:2px 0 10px;flex-wrap:wrap}
.char-portrait{position:relative;width:200px;height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
#char-canvas{width:190px;height:220px;filter:drop-shadow(0 0 20px rgba(240,214,138,.06));transition:filter .3s}
#char-canvas:hover{filter:drop-shadow(0 0 30px rgba(240,214,138,.12))}
.char-name-tag{font-size:.72em;color:var(--accent2);margin-top:1px;background:rgba(0,0,0,.35);padding:1px 12px;border-radius:8px;border:1px solid rgba(232,168,124,.1)}

.speech-area{flex:1;min-width:220px;max-width:430px}
.speech-bubble{background:var(--card);border-radius:14px;padding:12px 16px;border:1px solid rgba(240,214,138,.07);box-shadow:0 4px 20px var(--shadow);min-height:76px;transition:all .4s;position:relative}
.speech-bubble::before{content:'';position:absolute;left:-9px;top:30px;width:18px;height:18px;background:var(--card);border-left:1px solid rgba(240,214,138,.07);border-bottom:1px solid rgba(240,214,138,.07);transform:rotate(45deg)}
.speech-bubble .spk{font-size:.7em;color:var(--accent2);margin-bottom:2px}
.speech-bubble .sp-txt{font-size:.85em;line-height:1.6;color:var(--text)}
.speech-bubble .sp-txt em{color:var(--gold);font-style:normal}

.narr-box{background:rgba(28,24,56,.4);border-radius:12px;padding:10px 14px;margin:0 0 8px;border:1px solid rgba(255,255,255,.02);line-height:1.7;font-size:.8em;color:var(--text2);transition:all .4s}
.narr-box .hl{color:var(--accent)}

.choices-area{display:flex;flex-direction:column;gap:6px;margin:6px 0}
.choice-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card);border:1px solid rgba(240,214,138,.07);border-radius:10px;cursor:pointer;transition:all .3s;font-family:inherit;color:var(--text);text-align:left;font-size:.82em;position:relative;overflow:hidden}
.choice-btn::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent2);transform:scaleY(0);transition:transform .3s;border-radius:0 2px 2px 0}
.choice-btn:hover{background:var(--card-hover);border-color:rgba(240,214,138,.12);transform:translateX(2px)}
.choice-btn:hover::before{transform:scaleY(1)}
.choice-btn .ci{font-size:1.1em;flex-shrink:0}
.choice-btn .ce{font-size:.6em;color:var(--text2);flex-shrink:0;opacity:0;transition:opacity .3s}
.choice-btn:hover .ce{opacity:1}
.choice-btn .eg{color:var(--accent)}
.choice-btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.tl-mini{background:var(--card);border-radius:12px;padding:10px 14px;margin:12px 0 0;border:1px solid rgba(255,255,255,.02)}
.tl-mini h4{font-family:'Ma Shan Zheng',cursive;color:var(--accent);font-size:1em;text-align:center;margin-bottom:6px}
.tl{position:relative;padding:2px 0}
.tl::before{content:'';position:absolute;left:18px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:2px}
.tl-i{position:relative;padding:4px 0 4px 42px;cursor:pointer;transition:all .3s;opacity:.35}
.tl-i.unlocked{opacity:1}
.tl-i.current{opacity:1}
.tl-i:hover{background:rgba(255,255,255,.02);border-radius:6px}
.tl-i .tld{position:absolute;left:11px;top:8px;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.05);transition:all .3s}
.tl-i.unlocked .tld{background:var(--accent2);border-color:var(--accent2)}
.tl-i.current .tld{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(240,214,138,.25)}
.tl-i .tly{font-size:.66em;color:var(--text2)}
.tl-i .tlt{font-size:.76em;color:var(--text)}

/* ============================================================
   SHAKESPEARE WORLD - Character Collection
   ============================================================ */
.world-header{text-align:center;padding:8px 0;font-size:.8em;color:var(--text2)}
.world-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:8px 0}
.world-card{background:var(--card);border-radius:14px;padding:14px;cursor:pointer;border:1px solid rgba(255,255,255,.04);transition:all .3s;text-align:center}
.world-card:hover{background:var(--card-hover);border-color:rgba(240,214,138,.1);transform:translateY(-3px);box-shadow:0 6px 20px var(--shadow)}
.world-card.locked{opacity:.35;filter:grayscale(.6)}
.world-card.locked:hover{opacity:.5;transform:translateY(-2px)}
.world-card .w-avatar{font-size:2.8em;margin-bottom:4px;display:block}
.world-card .w-name{font-size:.8em;color:var(--text);margin-bottom:2px}
.world-card .w-title{font-size:.62em;color:var(--text2)}
.world-card .w-rel{font-size:.6em;margin-top:4px;padding:2px 8px;border-radius:8px;display:inline-block}
.w-rel.family{background:rgba(247,181,200,.12);color:var(--pink);border:1px solid rgba(247,181,200,.12)}
.w-rel.friend{background:rgba(168,216,234,.12);color:var(--sky);border:1px solid rgba(168,216,234,.12)}
.w-rel.rival{background:rgba(199,107,90,.12);color:var(--accent3);border:1px solid rgba(199,107,90,.12)}
.w-rel.patron{background:rgba(240,214,138,.12);color:var(--accent);border:1px solid rgba(240,214,138,.12)}
.w-rel.mystery{background:rgba(212,168,67,.12);color:var(--gold);border:1px solid rgba(212,168,67,.12)}

.world-card .w-dialog{font-size:.68em;color:var(--text2);margin-top:6px;font-style:italic;display:none;line-height:1.4}
.world-card.expanded .w-dialog{display:block}
.world-card .w-bio{font-size:.6em;color:var(--text2);margin-top:4px;display:none;line-height:1.4}
.world-card.expanded .w-bio{display:block}

/* ============================================================
   MINI GAMES
   ============================================================ */
.mg-hub{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin:8px 0}
.mg-card{background:var(--card);border-radius:14px;padding:16px;cursor:pointer;border:1px solid rgba(240,214,138,.05);transition:all .3s;text-align:center}
.mg-card:hover{background:var(--card-hover);border-color:rgba(240,214,138,.12);transform:translateY(-3px);box-shadow:0 6px 20px var(--shadow)}
.mg-card .mg-icon{font-size:2.4em;margin-bottom:4px}
.mg-card .mg-title{font-size:.9em;color:var(--accent);margin-bottom:3px}
.mg-card .mg-desc{font-size:.7em;color:var(--text2)}
.mg-back{display:inline-block;padding:4px 14px;background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:12px;cursor:pointer;font-family:inherit;font-size:.72em;transition:all .3s;margin-bottom:6px}
.mg-back:hover{background:rgba(240,214,138,.08)}

.hc-scene{background:var(--card);border-radius:12px;padding:12px 14px;margin:6px 0;border:1px solid rgba(255,255,255,.02)}
.hc-scene .hc-title{font-size:.82em;color:var(--accent2);margin-bottom:3px}
.hc-scene .hc-text{font-size:.78em;line-height:1.6;color:var(--text2)}
.hc-choice{padding:8px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:8px;cursor:pointer;transition:all .3s;font-family:inherit;color:var(--text);text-align:left;font-size:.78em;margin:3px 0;display:block;width:100%}
.hc-choice:hover{background:rgba(240,214,138,.06);border-color:var(--accent)}
.hc-choice:disabled{cursor:not-allowed;opacity:.5}
.hc-choice.picked{background:rgba(240,214,138,.1);border-color:var(--accent)}
.hc-result{margin:6px 0;padding:8px 12px;border-radius:8px;font-size:.76em;display:none;line-height:1.5}
.hc-result.show{display:block}
.hc-result.good{background:rgba(76,175,80,.06);border:1px solid rgba(76,175,80,.15);color:#81c784}
.hc-result.bad{background:rgba(199,107,90,.06);border:1px solid rgba(199,107,90,.15);color:#c76b5a}
.hc-result.neutral{background:rgba(240,214,138,.06);border:1px solid rgba(240,214,138,.1);color:var(--accent)}

.mm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:340px;margin:8px auto}
.mm-card{aspect-ratio:1;background:var(--card);border:1px solid rgba(240,214,138,.08);border-radius:8px;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:1.8em}
.mm-card:hover{transform:scale(1.03)}
.mm-card.flipped{background:rgba(240,214,138,.08);border-color:var(--accent)}
.mm-card.matched{background:rgba(76,175,80,.08);border-color:#4caf50;cursor:default;opacity:.6;transform:none!important}
.mm-score{text-align:center;font-size:.78em;color:var(--text2);margin-top:6px}

.qb-area{margin:6px 0;text-align:center}
.qb-hint{font-size:.82em;color:var(--accent2);margin-bottom:6px}
.qb-source{font-size:.68em;color:var(--text2);margin-top:4px}
.qb-words{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:6px 0;min-height:30px}
.qb-word{padding:5px 10px;background:var(--card);border:1px solid rgba(240,214,138,.08);border-radius:6px;cursor:pointer;font-family:inherit;color:var(--text);font-size:.74em;transition:all .2s;user-select:none}
.qb-word:hover{background:var(--card-hover);border-color:var(--accent)}
.qb-word.placed{background:rgba(240,214,138,.08);border-color:var(--accent);opacity:.4;cursor:default}
.qb-slots{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;min-height:30px;padding:8px;background:rgba(255,255,255,.02);border-radius:8px;border:1px dashed rgba(240,214,138,.12);margin:6px 0}
.qb-slot{padding:5px 10px;background:rgba(240,214,138,.03);border:1px dashed rgba(240,214,138,.15);border-radius:6px;min-width:40px;min-height:26px;display:flex;align-items:center;justify-content:center;font-size:.74em;color:var(--text2);transition:all .2s}
.qb-slot.filled{border-style:solid;border-color:var(--accent);color:var(--text)}
.qb-slot.correct{border-color:#4caf50;background:rgba(76,175,80,.06);color:#81c784}
.qb-btn{margin-top:6px;padding:6px 16px;background:var(--accent);color:#0c0a18;border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-size:.76em;font-weight:bold;transition:all .3s}
.qb-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(240,214,138,.2)}
.qb-btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}

/* ---- New Games ---- */
.sn-line{font-size:.9em;color:var(--accent);margin:6px 0;line-height:1.6;font-style:italic;text-align:center}
.sn-src{font-size:.66em;color:var(--text2);margin-bottom:6px;text-align:center}
.wi-word{font-size:1.3em;color:var(--accent2);font-weight:bold;margin:8px 0;text-align:center;letter-spacing:2px}
.qsp-quote{font-size:.88em;color:var(--gold);margin:8px 0;line-height:1.5;text-align:center;font-style:italic}
.mg-score-bar{font-size:.72em;color:var(--text2);text-align:center;margin-top:8px;padding:6px;background:rgba(255,255,255,.02);border-radius:8px}
.qsp-progress{display:flex;justify-content:center;gap:3px;margin:6px 0}
.qsp-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.05);transition:all .3s}
.qsp-dot.done{background:rgba(76,175,80,.4)}
.qsp-dot.wrong{background:rgba(199,107,90,.4)}
.qsp-dot.current{background:var(--accent);box-shadow:0 0 6px rgba(240,214,138,.3)}

/* ---- Work Detail + Travel ---- */
.work-detail{padding:4px 0}
.wd-title{font-size:1.15em;color:var(--accent);font-family:'Ma Shan Zheng',cursive;margin:4px 0}
.wd-en{font-size:.65em;color:var(--text2);font-weight:normal}
.wd-chars{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0 8px}
.wd-char{font-size:.68em;padding:2px 8px;background:var(--card);border-radius:10px;border:1px solid rgba(255,255,255,.04)}
.wd-intro{font-size:.76em;color:var(--text);line-height:1.7;margin:4px 0 10px;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:8px;border-left:3px solid var(--accent2)}
.wd-quote{font-style:italic;font-size:.78em;color:var(--gold);padding:8px 10px;margin:6px 0 10px;background:rgba(240,214,138,.04);border-radius:8px;border:1px solid rgba(240,214,138,.06);line-height:1.5}
.wd-qx{display:block;font-style:normal;font-size:.7em;color:var(--text2);margin-top:5px}
.wd-travel{display:block;width:100%;padding:10px;background:linear-gradient(135deg,var(--accent2),var(--accent3));color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-size:.82em;font-weight:bold;transition:all .3s;text-align:center}
.wd-travel:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(199,107,90,.3)}
.w-enter{font-size:.6em;color:var(--accent2);margin-top:4px;opacity:0;transition:opacity .3s;text-align:right}
.w-card:hover .w-enter{opacity:1}

.travel-scene{background:var(--card);border-radius:14px;padding:14px;border:1px solid rgba(240,214,138,.08);margin:6px 0}
.ts-bg{font-size:.7em;color:var(--accent2);margin-bottom:2px}
.ts-npc{font-size:.85em;color:var(--gold);margin:4px 0}
.ts-line{font-style:italic;color:var(--text2);font-size:.76em;margin-bottom:8px;padding-left:8px;border-left:2px solid var(--accent)}
.ts-divider{height:1px;background:rgba(255,255,255,.04);margin:8px 0}
.ts-scene{font-size:.8em;color:var(--text);line-height:1.6;margin:4px 0 10px}
.ts-choices{display:flex;flex-direction:column;gap:4px}
.ts-choice{padding:8px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(240,214,138,.08);border-radius:8px;cursor:pointer;font-family:inherit;color:var(--text);text-align:left;font-size:.74em;transition:all .3s}
.quiz-btn{padding:6px 20px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:16px;cursor:pointer;font-family:inherit;font-size:.78em;transition:all .3s}
.quiz-btn:hover{background:rgba(240,214,138,.06);transform:scale(1.05)}
.quiz-btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.ts-choice:hover{background:rgba(240,214,138,.06);border-color:var(--accent);transform:translateX(2px)}
.ts-choice:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

.find-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.find-item{aspect-ratio:1;background:var(--card);border:2px solid rgba(255,255,255,.04);border-radius:10px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:2em;gap:3px}
.find-item:hover{border-color:var(--accent);transform:scale(1.04)}
.find-item span{font-size:.28em;color:var(--text2);text-align:center;line-height:1.2;max-width:90%}
.find-item.found{cursor:default;transform:none!important}
.ts-tip{font-size:.64em;color:var(--text2);font-style:italic;text-align:center;margin:4px 0 8px}

.order-area{display:flex;flex-direction:column;gap:4px;margin:6px 0}
.order-item{padding:8px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;cursor:pointer;font-family:inherit;color:var(--text);text-align:left;font-size:.72em;transition:all .3s}
.order-item:hover{border-color:var(--accent);transform:translateX(2px)}
.order-item.placed{cursor:default;opacity:.85;font-weight:bold}
.order-tip{font-size:.64em;color:var(--text2);font-style:italic;text-align:center;margin-bottom:4px}

@media(max-width:700px){
  .find-grid{grid-template-columns:repeat(2,1fr)}
}

/* ---- Works ---- */
.works-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin:6px 0}
.works-scroll::-webkit-scrollbar{height:3px}
.works-scroll::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:3px}
.w-card{min-width:150px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:10px;cursor:pointer;transition:all .3s;flex-shrink:0}
.w-card:hover{background:var(--card-hover);border-color:rgba(240,214,138,.1);transform:translateY(-2px)}
.w-card .wb{font-size:.55em;padding:1px 6px;border-radius:5px;display:inline-block}
.wb.tragedy{background:rgba(199,107,90,.12);color:var(--accent3);border:1px solid rgba(199,107,90,.1)}
.wb.comedy{background:rgba(232,168,124,.12);color:var(--accent2);border:1px solid rgba(232,168,124,.1)}
.wb.history{background:rgba(240,214,138,.08);color:var(--accent);border:1px solid rgba(240,214,138,.08)}
.w-card .wt{font-size:.82em;color:var(--text);margin:2px 0 0}
.w-card .we{font-size:.6em;color:var(--text2);font-style:italic}
.w-card .wy{font-size:.62em;color:var(--text2)}
.w-card .wd{font-size:.68em;color:var(--text2);line-height:1.35;margin-top:5px;display:none}
.w-card.expanded .wd{display:block}

/* Works mini-quiz */
.w-quiz{background:var(--card);border-radius:12px;padding:12px 14px;margin:6px 0;border:1px solid rgba(255,255,255,.02)}
.w-quiz .wq-title{font-size:.8em;color:var(--accent);margin-bottom:6px}
.w-quiz .wq-q{font-size:.76em;color:var(--text);margin-bottom:8px;line-height:1.5}
.w-quiz .wq-opts{display:flex;flex-direction:column;gap:4px}
.w-quiz .wq-opt{padding:6px 10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:6px;cursor:pointer;transition:all .3s;font-family:inherit;color:var(--text);text-align:left;font-size:.72em}
.w-quiz .wq-opt:hover{background:rgba(240,214,138,.05);border-color:var(--accent)}
.w-quiz .wq-opt:disabled{cursor:not-allowed;opacity:.5}
.w-quiz .wq-opt.correct{background:rgba(76,175,80,.08);border-color:#4caf50;color:#81c784}
.w-quiz .wq-opt.wrong{background:rgba(199,107,90,.08);border-color:#c76b5a;color:#c76b5a}
.w-quiz .wq-fb{font-size:.7em;color:var(--text2);margin-top:6px;display:none;line-height:1.4}
.w-quiz .wq-fb.show{display:block}

/* ---- Quotes ---- */

/* ---- Achievement ---- */
.ach-toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:2px solid var(--accent);border-radius:12px;padding:10px 16px;box-shadow:0 6px 24px var(--shadow);z-index:100;transform:translateX(120%);transition:transform .5s cubic-bezier(.175,.885,.32,1.275);max-width:240px}
.ach-toast.show{transform:translateX(0)}
.ach-toast .ai{font-size:1.4em}
.ach-toast .at{font-size:.8em;color:var(--accent);font-weight:bold}
.ach-toast .ad{font-size:.68em;color:var(--text2)}

.restart-btn{position:fixed;top:10px;right:12px;z-index:50;background:var(--card);border:1px solid rgba(240,214,138,.08);color:var(--text2);padding:4px 10px;border-radius:14px;cursor:pointer;font-family:inherit;font-size:.64em;transition:all .3s}
.restart-btn:hover{border-color:var(--accent);color:var(--accent)}

.float-p{position:fixed;pointer-events:none;z-index:1;font-size:.4em;opacity:.05;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.06}90%{opacity:.06}100%{transform:translateY(-100vh) rotate(720deg);opacity:0}}

/* ---- Advanced Animations ---- */
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 6px rgba(240,214,138,.12)}50%{box-shadow:0 0 18px rgba(240,214,138,.28)}}
@keyframes borderGlow{0%,100%{border-color:rgba(240,214,138,.08)}50%{border-color:rgba(240,214,138,.22)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* Shimmer title */
header h1{background-size:200% auto;animation:shimmer 6s linear infinite}

/* Entrance stagger for card grids */
.mg-card{animation:fadeUp .45s ease both}
.mg-card:nth-child(2){animation-delay:.04s}.mg-card:nth-child(3){animation-delay:.08s}.mg-card:nth-child(4){animation-delay:.12s}.mg-card:nth-child(5){animation-delay:.16s}.mg-card:nth-child(6){animation-delay:.2s}.mg-card:nth-child(7){animation-delay:.24s}.mg-card:nth-child(8){animation-delay:.28s}.mg-card:nth-child(9){animation-delay:.32s}.mg-card:nth-child(10){animation-delay:.36s}.mg-card:nth-child(11){animation-delay:.4s}.mg-card:nth-child(12){animation-delay:.44s}.mg-card:nth-child(13){animation-delay:.48s}.mg-card:nth-child(14){animation-delay:.52s}.mg-card:nth-child(15){animation-delay:.56s}.mg-card:nth-child(16){animation-delay:.6s}
.world-card{animation:fadeUp .45s ease both}
.world-card:nth-child(2){animation-delay:.04s}.world-card:nth-child(3){animation-delay:.08s}.world-card:nth-child(4){animation-delay:.12s}.world-card:nth-child(5){animation-delay:.16s}.world-card:nth-child(6){animation-delay:.2s}.world-card:nth-child(7){animation-delay:.24s}.world-card:nth-child(8){animation-delay:.28s}.world-card:nth-child(9){animation-delay:.32s}.world-card:nth-child(10){animation-delay:.36s}.world-card:nth-child(11){animation-delay:.4s}.world-card:nth-child(12){animation-delay:.44s}
.w-card{animation:fadeUp .4s ease both}
.w-card:nth-child(2){animation-delay:.04s}.w-card:nth-child(3){animation-delay:.08s}.w-card:nth-child(4){animation-delay:.12s}.w-card:nth-child(5){animation-delay:.16s}.w-card:nth-child(6){animation-delay:.2s}.w-card:nth-child(7){animation-delay:.24s}.w-card:nth-child(8){animation-delay:.28s}.w-card:nth-child(9){animation-delay:.32s}.w-card:nth-child(10){animation-delay:.36s}.w-card:nth-child(11){animation-delay:.4s}.w-card:nth-child(12){animation-delay:.44s}.w-card:nth-child(13){animation-delay:.48s}.w-card:nth-child(14){animation-delay:.52s}

/* Tab content fade-in */
.tab-content.active{animation:fadeUp .3s ease both}

/* Active glow pulse */
.tab-btn.active{animation:glowPulse 2.5s ease-in-out infinite}
.s-dot.active{animation:glowPulse 2s ease-in-out infinite}

/* Card glow on hover */
.w-card:hover,.world-card:hover,.mg-card:hover{animation:borderGlow 2s ease-in-out infinite}

/* Ripple container */
.choice-btn,.ts-choice,.hc-choice,.mg-card,.world-card,.w-card,.wd-travel{position:relative;overflow:hidden}
.ripple{position:absolute;border-radius:50%;background:rgba(240,214,138,.25);transform:scale(0);animation:rippleAnim .6s ease-out;pointer-events:none}

/* Achievement + stat icon pop */
.ach-toast .ai{display:inline-block;animation:popIn .5s ease both}
.stat.pop .v{animation:popIn .3s ease both;display:inline-block}

/* Cinematic vignette overlay */
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;background:radial-gradient(ellipse at center,transparent 55%,rgba(12,10,24,.5) 100%)}

/* Smoother speech transition */
.speech-bubble{animation:fadeUp .35s ease both}

@media(max-width:700px){
  header h1{font-size:1.8em}
  .char-main{flex-direction:column;gap:8px}

  .world-grid{grid-template-columns:repeat(3,1fr)}
  .s-dot{width:20px}
  .stats-bar{gap:5px}.stat{font-size:.65em;padding:2px 7px}
  .tab-btn{font-size:.68em;padding:4px 8px}
  .mm-grid{max-width:240px;gap:4px}.mm-card{font-size:1.3em}
  .mg-hub{grid-template-columns:1fr 1fr}
}
</style>

<body>

<canvas id="starfield"></canvas>
<div id="floaties"></div>
<button class="restart-btn" onclick="restartGame()">&#128260; 重来</button>

<header>

  <div class="sub">&#127775; 书写属于你的传奇</div>
</header>

<div class="tabs" id="tabs">

  <button class="tab-btn" data-tab="world">&#127758; 世界</button>
  <button class="tab-btn" data-tab="plays">&#127916; 戏中戏</button>
  <button class="tab-btn" data-tab="works">&#128218; 作品</button>
  <button class="tab-btn" data-tab="quotes">&#128172; 名句</button>
</div>

<div class="game-container">

<div class="tab-content active" id="tab-journey">
  <div class="stats-bar" id="statsBar">
    <div class="stat" id="sFame"><span>&#127775;</span> 声望 <span class="v" id="vFame">0</span></div>
    <div class="stat" id="sLove"><span>&#128153;</span> 情感 <span class="v" id="vLove">0</span></div>
    <div class="stat" id="sWealth"><span>&#128176;</span> 财富 <span class="v" id="vWealth">0</span></div>
    <div class="stat" id="sWisdom"><span>&#128214;</span> 智慧 <span class="v" id="vWisdom">0</span></div>
  </div>
  <div class="s-dots" id="sDots"></div>
  <div class="char-main">
    <div class="char-portrait" id="charPortrait" onclick="clickChar()">
      <canvas id="char-canvas" width="190" height="220"></canvas>
      <div class="char-name-tag" id="nameTag">&#127916; 威廉·莎士比亚</div>

    <div class="speech-area">
      <div class="speech-bubble">
        <div class="spk" id="spk">&#128172; 命运之声</div>

      </div>

  <div class="narr-box" id="narrBox">点击下方按钮开始旅程</div>
  <div class="choices-area" id="choicesArea">
    <button class="choice-btn" id="startBtn" onclick="startGame()">
      <span class="ci">&#127917;</span><span class="choice-label">开始莎士比亚的传奇人生！</span>
    </button>

  <div class="tl-mini">
    <h4>&#128214; 人生足迹</h4>
    <div class="tl" id="tl"></div>
  </div>
</div>

<!-- TAB 2: WORLD -->
<div class="tab-content" id="tab-world">

</div>

<!-- TAB 3: PLAYS -->
<div class="tab-content" id="tab-plays">
  <div class="mg-hub" id="mgHub"></div>

</div>

<!-- TAB 4: WORKS -->

    <div class="wq-opts" id="wqOpts"></div>
    <div class="wq-fb" id="wqFb"></div>
  </div>
  <div class="works-scroll" id="worksScroll"></div>
  <div id="workDetail" style="display:none"></div>
  <div id="travelArea" style="display:none"></div>
</div>

<!-- TAB 5: QUOTES -->

    <div class="qt" id="qtText">加载中...</div>

      <button id="qtPrev">&#9664; 上一条</button>
      <button id="qtNext">下一条 &#9654;</button>

</div>

</div>

</div>

<script>
// ============================================================
// DATA

const STAGES = [
  {id:'baby',label:'&#127968;诞生',year:'1564'},
  {id:'child',label:'&#128218;求学',year:'1571-79'},

  {id:'adult',label:'&#127916;伦敦',year:'1592-1600'},
  {id:'mature',label:'&#127942;巅峰',year:'1605-13'},
  {id:'legend',label:'&#128329;永恒',year:'1616-'}
];

const SCENARIOS = [
  {stage:0,speaker:'&#127775;命运之声',
   narrative:'<span class="hl">&#127968; 1564年4月·斯特拉特福</span><br>春日的晨光中，一个新的生命降生了。父亲约翰是皮革商人，母亲玛丽·雅顿出身名门。小镇的生活宁静而美好，但这个孩子的啼哭，终将响彻整个世界。',
   text:'小威廉好奇地打量着这个世界。<br>你希望他拥有怎样的童年？',
   choices:[{icon:'&#128214;',label:'沉浸在书本中',effect:'+智慧',stat:'wisdom',val:2,unlock:'mary'},{icon:'&#127775;',label:'鼓励大胆表达',effect:'+声望',stat:'fame',val:2,unlock:'john'},{icon:'&#128153;',label:'给予满满的爱',effect:'+情感',stat:'love',val:2,unlock:'anne'}]},
  {stage:1,speaker:'&#128218;文法学校',
   narrative:'<span class="hl">&#127891; 1571年·国王新学校</span><br>教室里弥漫着墨香，老师在用拉丁文朗读古罗马的诗篇。窗外传来小鸟的啁啾声，隔壁镇集上热闹非凡。你的心，早已飞向了远方。',
   text:'"威廉！你又走神了！"<br>你决定怎么做？',
   choices:[{icon:'&#128214;',label:'认真背诵拉丁文',effect:'+智慧',stat:'wisdom',val:3},{icon:'&#9998;',label:'偷偷在角落写诗',effect:'+声望',stat:'fame',val:2},{icon:'&#127908;',label:'和同学们演短剧',effect:'+情感',stat:'love',val:2}]},
  {stage:2,speaker:'&#128153;年轻的心',
   narrative:'<span class="hl">&#128152; 1582年·斯特拉特福郊外</span><br>26岁的安妮·海瑟薇走进了你的生活。她比你大8岁，成熟而温柔。但父亲的生意不顺，家里的经济状况在恶化，而远方的伦敦似乎在召唤着你……',
   text:'你站在人生的十字路口。<br>爱情、家庭、梦想——你选择哪个？',
   choices:[{icon:'&#128153;',label:'向安妮求婚',effect:'+情感',stat:'love',val:3,unlock:'hamnet'},{icon:'&#128176;',label:'学做生意帮家计',effect:'+财富',stat:'wealth',val:2},{icon:'&#128640;',label:'收拾行囊去伦敦',effect:'+声望',stat:'fame',val:2,unlock:'marlowe'}]},
  {stage:3,speaker:'&#127916;环球剧场',
   narrative:'<span class="hl">&#127961; 1599年·泰晤士河南岸</span><br>崭新的环球剧场在阳光下熠熠生辉。你是"宫内大臣剧团"的股东兼剧作家。伦敦的观众热情而挑剔——你的笔，就是你的利剑。',
   text:'新剧即将上演，你决定写什么？',
   choices:[{icon:'&#128557;',label:'悲剧《哈姆雷特》',effect:'+智慧声望',stat:'wisdom',val:3,stat2:'fame',val2:2,unlock:'burbage'},{icon:'&#128513;',label:'喜剧《仲夏夜之梦》',effect:'+情感财富',stat:'love',val:3,stat2:'wealth',val2:2,unlock:'elizabeth'},{icon:'&#128081;',label:'历史剧《亨利五世》',effect:'+声望财富',stat:'fame',val:3,stat2:'wealth',val2:2}]},
  {stage:4,speaker:'&#127769;命运低语',
   narrative:'<span class="hl">&#127942; 1606年·巅峰与谷底</span><br>11岁的儿子哈姆内特夭折，你悲痛欲绝，却将痛苦化作最震撼的悲剧——《李尔王》《麦克白》相继问世。如今你誉满天下，但内心总有一角空落落的。',
   text:'你已经登上了戏剧界的顶峰。下一步怎么走？',
   choices:[{icon:'&#128214;',label:'继续深挖人性悲剧',effect:'+智慧声望',stat:'wisdom',val:3,stat2:'fame',val2:2,unlock:'james'},{icon:'&#127968;',label:'回归家庭享受天伦',effect:'+情感财富',stat:'love',val:3,stat2:'wealth',val2:2},{icon:'&#127769;',label:'写传奇剧宽恕和解',effect:'+情感智慧',stat:'love',val:2,stat2:'wisdom',val2:3,unlock:'jonson'}]},
  {stage:5,speaker:'&#128329;时光回响',
   narrative:'<span class="hl">&#127870; 1616年·斯特拉特福</span><br>阳光穿过苹果树洒在你的脸上。你写下了38部剧本、154首十四行诗、创造了1700多个英语单词。现在，是时候写下最后的句点了。',

];

const ENDING_TEXTS={
  fame:['你成为<strong>"不朽的吟游诗人"</strong>！作品被译成所有主要语言，你是英语语言最伟大的作家。','你是受人尊敬的剧作家，名字将镌刻在戏剧史上。','你享受写作的快乐，但名声未远扬——但你对戏剧的热爱是真实的。'],
  love:['你是<strong>"最懂人心的作家"</strong>！爱情故事让无数人落泪，你做到了"爱所有人，信任少数人，不负任何人"。','你珍惜身边的人，作品充满温暖的情感，触动了人们心中最柔软的地方。','你有些孤独，但作品依然闪烁着情感的火花。'],
  wealth:['你<strong>"财富与才华兼备"</strong>！买下斯特拉特福最大的宅邸，为家族赢得纹章，商业与艺术一样出众！','生活还算宽裕，有舒适的房子和稳定的收入。','一生清贫，但精神世界无人能及。'],
  wisdom:['你是<strong>"智慧的化身"</strong>！"To be,or not to be"是你对人类存在本身的追问。','你富有智慧，作品充满发人深省的思考。','生活教会了你很多，快乐本身也是一门学问。']};

const WORLD_CHARS = [
  {id:'john',name:'约翰·莎士比亚',title:'父亲 · 手套商人',emoji:'&#128104;',rel:'family',bio:'莎士比亚的父亲，斯特拉特福镇镇长。他教会了小威廉经商的头脑和对世界的热爱。',dialog:'"孩子，这个世界比你能想象的更大。"',unlock:'选择鼓励表达'},
  {id:'mary',name:'玛丽·雅顿',title:'母亲 · 名门之后',emoji:'&#128105;',rel:'family',bio:'莎士比亚的母亲，出身于当地富有的自耕农家庭。她给了小威廉温暖的爱和对故事的喜爱。',dialog:'"小威廉，我的小诗人，愿你永远保持这份温柔。"',unlock:'选择给予关爱'},
  {id:'anne',name:'安妮·海瑟薇',title:'妻子 · 一生所爱',emoji:'&#128105;',rel:'family',bio:'莎士比亚的妻子，比他大8岁。两人于1582年结婚，育有三子。虽长期分居，但安妮始终守护着斯特拉特福的家。',dialog:'"威廉，无论你在伦敦有多成功，记得家里永远有盏灯为你亮着。"',unlock:'选择沉浸在书本'},
  {id:'hamnet',name:'哈姆内特',title:'儿子 · 早逝的爱',emoji:'&#128102;',rel:'family',bio:'莎士比亚唯一的儿子，与妹妹朱迪思是双胞胎。1596年11岁时夭折，死因不明。他的去世深刻影响了莎士比亚后来的悲剧创作。',dialog:'"爸爸，你写的那些故事……它们会永远活着吗？"',unlock:'选择向安妮求婚'},
  {id:'burbage',name:'理查·伯比奇',title:'伙伴 · 首席演员',emoji:'&#128104;',rel:'friend',bio:'莎士比亚最亲密的合作伙伴，宫内大臣剧团的首席演员。他演出了哈姆雷特、理查三世、奥赛罗等几乎所有莎剧主角。',dialog:'"威廉，你的台词让我成为了最伟大的演员——但也是你的剧本让我夜不能寐。"',unlock:'选择写《哈姆雷特》'},

const CV = document.getElementById('char-canvas');
const CX = CV.getContext('2d');
let blink = 0, bState = 0, bobOffset = 0;

function drawChar(stage, expr) {
  CX.clearRect(0,0,190,220);
  bobOffset = Math.sin(Date.now() * 0.002) * 2;
  CX.save();
  CX.translate(0, bobOffset);
  CX.shadowColor='rgba(0,0,0,.06)';CX.shadowBlur=12;
  CX.beginPath();CX.ellipse(95,208,34,5,0,0,Math.PI*2);CX.fill();
  CX.shadowBlur=0;
  switch(stage){
    case 0:drawSBaby(expr);break;
    case 1:drawSChild(expr);break;
    case 2:drawSTeen(expr);break;
    case 3:drawSAdult(expr);break;
    case 4:drawSMature(expr);break;
    case 5:drawSLegend(expr);break;
    default:drawSAdult(expr);
  }
  CX.restore();
}

// SD Proportions: head is ~60% of total height, giant eyes
function sdHead(x,y,r,skin='#fee7d6'){
  CX.fillStyle=skin;
  CX.beginPath();CX.arc(x,y,r,0,Math.PI*2);CX.fill();
}

function sdEyes(cx,cy,r,expr){
  if(bState===1){CX.fillStyle='#fee7d6';CX.fillRect(cx-r,cy-r*.2,r*2.4,r*.7);CX.strokeStyle='#4a2e1a';CX.lineWidth=1;CX.beginPath();CX.moveTo(cx-r,cy);CX.lineTo(cx+r,cy);CX.stroke();return}
  // Shadow
  CX.fillStyle='#3d2b1f';
  CX.beginPath();CX.ellipse(cx,cy,r*.82,r*1.12,0,0,Math.PI*2);CX.fill();
  // White
  CX.fillStyle='#fff';
  CX.beginPath();CX.ellipse(cx,cy-1,r*.68,r*.98,0,0,Math.PI*2);CX.fill();
  // Iris gradient
  const g=CX.createRadialGradient(cx-r*.15,cy-r*.3,0,cx,cy,r*.52);
  g.addColorStop(0,'#8b6b4a');g.addColorStop(.5,'#5a3d28');g.addColorStop(1,'#1a0f08');
  CX.fillStyle=g;
  CX.beginPath();CX.ellipse(cx,cy,r*.52,r*.62,0,0,Math.PI*2);CX.fill();
  // Pupil
  CX.fillStyle='#0a0502';CX.beginPath();CX.arc(cx,cy,r*.28,0,Math.PI*2);CX.fill();
  // Catchlights
  CX.fillStyle='#fff';CX.beginPath();CX.arc(cx-r*.2,cy-r*.25,r*.16,0,Math.PI*2);CX.fill();
  CX.fillStyle='rgba(255,255,255,.6)';CX.beginPath();CX.arc(cx+r*.18,cy+r*.02,r*.09,0,Math.PI*2);CX.fill();
  // Eyelashes
  CX.strokeStyle='#3d2b1f';CX.lineWidth=1.2;
  for(let i=-.8;i<=.8;i+=.4){const lx=cx+i*r*.55;CX.beginPath();CX.moveTo(lx,cy-r*1.02);CX.lineTo(lx+i*1.5,cy-r*1.3);CX.stroke()}
}

function sdMouth(x,y,expr){
  CX.lineWidth=1.8;
  if(expr==='happy'||expr==='default'){CX.strokeStyle='#c97070';CX.beginPath();CX.arc(x,y,5,.1,Math.PI-.1);CX.stroke()}
  else if(expr==='sad'){CX.strokeStyle='#a06060';CX.beginPath();CX.arc(x,y+2,4,Math.PI+.2,Math.PI*2-.2);CX.stroke()}
  else if(expr==='surprised'){CX.fillStyle='#c97070';CX.beginPath();CX.ellipse(x,y+1,3.5,4.5,0,0,Math.PI*2);CX.fill()}
  else if(expr==='thinking'){CX.strokeStyle='#c97070';CX.beginPath();CX.arc(x-3,y,3.5,.3,Math.PI-.3);CX.stroke()}
  else if(expr==='wow'){CX.fillStyle='#c97070';CX.beginPath();CX.ellipse(x,y+1,6,7,0,0,Math.PI*2);CX.fill()}
}

function startGame(){
  GS={stage:0,fame:0,love:0,wealth:0,wisdom:0,choices:[],completed:false,unlocked:0,started:true,expression:'happy',unlockedChars:[]};
  document.getElementById('startBtn').style.display='none';
  buildDots();showScene(0);updStats();updTL();
}

function restartGame(){
  if(!GS.started)return;
  GS={stage:0,fame:0,love:0,wealth:0,wisdom:0,choices:[],completed:false,unlocked:0,started:false,expression:'happy',unlockedChars:[]};
  achievements=new Set();
  document.getElementById('startBtn').style.display='flex';
  document.getElementById('startBtn').innerHTML='<span class="ci">&#127917;</span><span class="choice-label">重新开始传奇！</span>';
  const ca=document.getElementById('choicesArea');ca.innerHTML='';ca.appendChild(document.getElementById('startBtn'));
  setSpeech('&#128260; 命运之声','游戏已重置。点击按钮再次启程！');
  setNarr('一切归零，新的故事等你书写……');
  document.getElementById('nameTag').innerHTML='&#127916; 威廉·莎士比亚';
  updStats();updTL();buildDots();drawChar(0,'happy');buildWorld();
}

function showScene(idx){
  if(idx>=SCENARIOS.length){showEnd();return}
  GS.stage=idx;const sc=SCENARIOS[idx];
  drawChar(idx,'happy');document.getElementById('nameTag').innerHTML='&#127916; '+STAGES[idx].label;
  setSpeech(sc.speaker,sc.text);setNarr(sc.narrative);
  document.querySelectorAll('.s-dot').forEach((d,i)=>{d.classList.toggle('active',i===idx);d.classList.toggle('past',i<idx)});
  const ca=document.getElementById('choicesArea');ca.innerHTML='';
  sc.choices.forEach((ch,i)=>{
    const b=document.createElement('button');b.className='choice-btn';b.style.animationDelay=i*.06+'s';
    b.innerHTML=`<span class="ci">${ch.icon}</span><span class="choice-label">${ch.label}</span><span class="ce"><span class="eg">${ch.effect}</span></span>`;
    b.onclick=()=>makeChoice(idx,i);ca.appendChild(b);
  });
  updTL();
  if(idx>GS.unlocked){GS.unlocked=idx;unlock('&#127775;',STAGES[idx].label,'到达了'+STAGES[idx].year)}
  buildWorld();
}

function makeChoice(si,ci){
  const sc=SCENARIOS[si],ch=sc.choices[ci];
  GS.choices.push({stage:si,choice:ci,label:ch.label});
  GS[ch.stat]+=ch.val;if(ch.stat2)GS[ch.stat2]+=ch.val2;
  animateStat(ch.stat);if(ch.stat2)animateStat(ch.stat2);updStats();
  drawChar(si,ch.val>=3?'happy':'surprised');
  // Unlock character
  if(ch.unlock&&!GS.unlockedChars.includes(ch.unlock)){
    GS.unlockedChars.push(ch.unlock);
    const wc=WORLD_CHARS.find(c=>c.id===ch.unlock);
    if(wc)unlock('&#127758;',wc.name,'已在莎翁世界中解锁！');
    buildWorld();
  }
  const react=getReact(si,ci);
  setSpeech('&#127775; 命运之声',react.speech);setNarr(react.narr);
  const ca=document.getElementById('choicesArea');
  ca.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const cb=document.createElement('button');cb.className='choice-btn';
  cb.innerHTML='<span class="ci">&#10132;</span><span class="choice-label">继续旅程……</span>';
  cb.onclick=()=>{const n=si+1;n>=SCENARIOS.length?showEnd():showScene(n)};ca.appendChild(cb);
}

function showEnd(){
  GS.completed=true;
  const {fame:f,love:l,wealth:w,wisdom:wi}=GS;
  let endT='&#127942; 你的传奇',endD='你走完了莎士比亚的一生。';
  if(f>=6)endT='&#127775; 不朽的吟游诗人';else if(l>=6)endT='&#128153; 爱的诗人';else if(wi>=6)endT='&#128214; 智慧的先哲';
  else if(f>=4&&l>=4)endT='&#127916; 完美戏剧家';else endT='&#127968; 平凡的幸福';
  const ft=ENDING_TEXTS.fame[f>=6?0:f>=3?1:2],lt=ENDING_TEXTS.love[l>=6?0:l>=3?1:2],wt=ENDING_TEXTS.wealth[w>=6?0:w>=3?1:2],wit=ENDING_TEXTS.wisdom[wi>=6?0:wi>=3?1:2];
  setSpeech('&#128329; 时光回响','"我们的短暂一生，不过是一场酣睡之后的梦……"<br>你的故事已经写完，但传奇永不落幕。');
  setNarr(`<span class="hl">${endT}</span><br><br>${ft}<br><br>${lt}<br><br>${wt}<br><br>${wit}`);
  const ca=document.getElementById('choicesArea');
  ca.innerHTML=`<div style="text-align:center;padding:10px;background:rgba(240,214,138,.04);border-radius:10px;border:1px solid rgba(240,214,138,.06);"><div style="font-size:1em;color:var(--accent)">${endT}</div><div style="font-size:.7em;color:var(--text2);margin-top:3px">声望${f}|情感${l}|财富${w}|智慧${wi}</div></div>`;
  const rb=document.createElement('button');rb.className='choice-btn';
  rb.innerHTML='<span class="ci">&#128260;</span><span class="choice-label">重新书写传奇！</span>';
  rb.onclick=restartGame;ca.appendChild(rb);
  drawChar(5,'happy');document.getElementById('nameTag').innerHTML='&#128329; 不朽的吟游诗人';
  unlock('&#127942;','完成旅程','你完整地经历了莎士比亚的一生！');
  ['fame','love','wealth','wisdom'].forEach(s=>animateStat(s));
}

function setSpeech(spk,txt){document.getElementById('spk').innerHTML=spk;document.getElementById('spTxt').innerHTML=txt.replace(/\n/g,'<br>')}
function setNarr(h){document.getElementById('narrBox').innerHTML=h}
function updStats(){['fame','love','wealth','wisdom'].forEach(s=>document.getElementById('v'+s.charAt(0).toUpperCase()+s.slice(1)).textContent=GS[s])}
function animateStat(s){const el=document.getElementById('s'+s.charAt(0).toUpperCase()+s.slice(1));if(el){el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),600)}}
function buildDots(){document.getElementById('sDots').innerHTML=STAGES.map((s,i)=>`<div class="s-dot${i===0?' active':''}" onclick="showScene(${i})" title="${s.year}"></div>`).join('')}
function updTL(){document.getElementById('tl').innerHTML=STAGES.map((s,i)=>{const u=i<=GS.unlocked||GS.completed,c=i===GS.stage;return `<div class="tl-i${u?c?' current':' unlocked':''}" onclick="showScene(${i})"><div class="tld"></div><div class="tly">${s.year}</div><div class="tlt">${s.label}${GS.choices.find(c=>c.stage===i)?' &#10003;':''}</div></div>`}).join('')}
function unlock(icon,title,desc){if(achievements.has(title))return;achievements.add(title);const t=document.getElementById('achToast');document.getElementById('achIcon').innerHTML=icon;document.getElementById('achTitle').innerHTML='成就解锁：'+title;document.getElementById('achDesc').innerHTML=desc;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500)}

function initHamlet(cont){
  let st={scene:0,good:0,bad:0,neutral:0,ended:false};
  cont.innerHTML=`<button class="mg-back" onclick="setupMG()">&#9664; 返回</button><div id="hcArea"></div>`;
  function show(){
    const a=document.getElementById('hcArea');if(!a)return;
    if(st.ended||st.scene>=HSCENES.length-1){
      const t=st.good>st.bad?'good':st.bad>st.good?'bad':'neutral';
      a.innerHTML=`<div class="hc-scene"><div class="hc-title">&#128329; 结局</div><div class="hc-text">${HENDS[t]}</div><div style="margin-top:8px;font-size:.7em;color:var(--text2)">善行${st.good}|中庸${st.neutral}|鲁莽${st.bad}</div></div>`;
      unlock('&#128557;','哈姆雷特的抉择','体验了莎翁最著名的悲剧！');return;

    s.choices.forEach((c,i)=>{h+=`<button class="hc-choice" onclick="(function(){const a=document.getElementById('hcArea');if(!a)return;document.querySelectorAll('.hc-choice').forEach(b=>b.disabled=true);st.${c.t}++;const r=document.getElementById('hcResult');if(r)r.innerHTML='<div class=\\"hc-result show ${c.t}\\">${c.r}</div>';st.scene=${c.n};setTimeout(()=>show(),1800)})()">${c.l}</button>`});
    h+=`</div><div id="hcResult"></div>`;a.innerHTML=h;
  }
  show();
  // Store state in DOM for closure access
  window.__hSt=st;window.__hShow=show;
}

function initMemory(cont){
  const pairs=[{a:'&#128105;罗密欧',b:'&#128103;朱丽叶'},{a:'&#128104;哈姆雷特',b:'&#128105;奥菲莉亚'},{a:'&#128105;奥赛罗',b:'&#128103;苔丝狄蒙娜'},{a:'&#128104;培尼狄克',b:'&#128105;贝特丽丝'},{a:'&#128103;鲍西娅',b:'&#128104;巴萨尼奥'},{a:'&#128104;麦克白',b:'&#128105;麦克白夫人'},{a:'&#128104;安东尼',b:'&#128105;克莉奥佩特拉'},{a:'&#128105;米兰达',b:'&#128104;腓迪南'}];
  const cards=pairs.sort(()=>Math.random()-.5).slice(0,4).flatMap((p,i)=>[{id:i*2,p:i,t:p.a,f:false,m:false},{id:i*2+1,p:i,t:p.b,f:false,m:false}]).sort(()=>Math.random()-.5);
  let fl=[],locked=false,matched=0,tries=0;
  cont.innerHTML=`<button class="mg-back" onclick="setupMG()">&#9664; 返回</button><div class="mm-grid" id="mmG"></div><div class="mm-score">尝试<span id="mmT">0</span>|配对<span id="mmM">0</span>/4</div>`;
  function rndr(){const g=document.getElementById('mmG');if(!g)return;g.innerHTML=cards.map(c=>`<div class="mm-card${c.f?' flipped':''}${c.m?' matched':''}" onclick="${c.m||c.f||locked?'':`(function(){if(locked)return;c.f=true;fl.push(c);rndr();if(fl.length===2){locked=true;tries++;document.getElementById('mmT').textContent=tries;const[a,b]=fl;if(a.p===b.p){a.m=true;b.m=true;matched++;document.getElementById('mmM').textContent=matched;fl=[];locked=false;if(matched===4)unlock('&#128152;','恋人对对碰','为莎翁恋人牵线成功！');rndr()}else{setTimeout(()=>{a.f=false;b.f=false;fl=[];locked=false;rndr()},800)}}})()`}"><span style="${c.f||c.m?'display:none':''}">&#128214;</span><span style="${c.f||c.m?'':'display:none'}">${c.t}</span></div>`).join('')}
  rndr();
}

// Quote
function initQuote(cont){
  const puzzles=[
    {q:'To be, or not to be: that is the question',s:'《哈姆雷特》'},
    {q:'All the world\'s a stage, and all the men and women merely players',s:'《皆大欢喜》'},
    {q:'The course of true love never did run smooth',s:'《仲夏夜之梦》'},
    {q:'If music be the food of love, play on',s:'《第十二夜》'},
    {q:'Love all, trust a few, do wrong to none',s:'《皆大欢喜》'},
    {q:'What\'s in a name? That which we call a rose by any other name would smell as sweet',s:'《罗密欧与朱丽叶》'}];
  const puz=puzzles[Math.floor(Math.random()*puzzles.length)];
  let words=puz.q.split(' ').sort(()=>Math.random()-.5);
  let slots=new Array(words.length).fill(null),complete=false;
  function rndr(){
    const c=document.getElementById('qc');if(!c)return;
    c.innerHTML=`<div class="qb-hint">&#128172; 点击单词放入空格，点击空格取回</div>
      <div class="qb-words">${words.map((w,i)=>`<span class="qb-word${slots.includes(i)?' placed':''}" onclick="${complete?'':`(function(){if(complete)return;if(slots.includes(${i}))return;const e=slots.indexOf(null);if(e===-1)return;slots[e]=${i};rndr()})()`}">${w}</span>`).join('')}</div>

function setupStars(){
  const c=document.getElementById('starfield'),cx=c.getContext('2d');
  let s=[],ms=[],nb=[];let mt=0;
  function rs(){
    c.width=innerWidth;c.height=innerHeight;
    const w=c.width,h=c.height;
    s=Array.from({length:200},()=>{
      const t=Math.random();
      return{
        x:Math.random()*w,y:Math.random()*h,
        r:t<.6?.3+.3*Math.random():t<.85?.7+.4*Math.random():1.2+.8*Math.random(),
        ph:Math.random()*Math.PI*2,
        sp:Math.random()*.025+.005,
        tint:t<.8?[255,255,255]:t<.9?[200,220,255]:[255,225,200],
        ba:.08+Math.random()*.18
      };
    });
    nb=Array.from({length:3},()=>({
      x:Math.random()*w,y:Math.random()*h,
      r:80+Math.random()*120,
      dx:(Math.random()-.5)*.06,
      dy:(Math.random()-.5)*.06,
      col:[[232,168,124,12],[168,216,234,10],[212,168,67,8]][Math.floor(Math.random()*3)]
    }));
  }
  function fireMeteor(){
    if(ms.length>=3)return;
    const a=Math.random()*.4+.2;
    ms.push({
      x:Math.random()*c.width*1.4-c.width*.2,
      y:Math.random()*c.height*.3,
      dx:Math.cos(a),dy:Math.sin(a),
      l:80+Math.random()*80,life:1
    });
  }
  function dr(t){
    cx.clearRect(0,0,c.width,c.height);
    const w=c.width,h=c.height;
    // nebula clouds
    nb.forEach(n=>{
      n.x+=n.dx;n.y+=n.dy;
      if(n.x<-200||n.x>w+200)n.dx*=-1;
      if(n.y<-200||n.y>h+200)n.dy*=-1;
      const g=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0,`rgba(${n.col[0]},${n.col[1]},${n.col[2]},.025)`);
      g.addColorStop(.5,`rgba(${n.col[0]},${n.col[1]},${n.col[2]},.012)`);
      g.addColorStop(1,`rgba(${n.col[0]},${n.col[1]},${n.col[2]},0)`);
      cx.fillStyle=g;cx.beginPath();cx.arc(n.x,n.y,n.r,0,Math.PI*2);cx.fill();
    });
    // stars
    s.forEach(st=>{
      const tw=(Math.sin(st.ph+t*st.sp)+1)*.5;
      const a=tw*st.ba+st.ba*.3;
      cx.globalAlpha=Math.min(a,1);
      cx.fillStyle=`rgb(${st.tint[0]},${st.tint[1]},${st.tint[2]})`;
      cx.beginPath();cx.arc(st.x,st.y,st.r,0,Math.PI*2);cx.fill();
      if(st.r>.9){
        cx.globalAlpha=a*.12;
        cx.beginPath();cx.arc(st.x,st.y,st.r*2.5,0,Math.PI*2);cx.fill();
      }
    });
    cx.globalAlpha=1;
    // meteors
    ms.forEach((m,i)=>{
      m.x+=m.dx*3;m.y+=m.dy*3;m.life-=.008;
      if(m.life<=0){ms.splice(i,1);return}
      const g=cx.createLinearGradient(m.x,m.y,m.x-m.dx*m.l,m.y-m.dy*m.l);
      g.addColorStop(0,`rgba(255,255,255,${m.life})`);
      g.addColorStop(1,`rgba(255,255,255,0)`);
      cx.strokeStyle=g;cx.lineWidth=1.5;cx.beginPath();
      cx.moveTo(m.x,m.y);cx.lineTo(m.x-m.dx*m.l,m.y-m.dy*m.l);cx.stroke();
    });
    requestAnimationFrame(dr);
  }
  // meteor spawn loop
  function ml(){const d=1500+Math.random()*6000;setTimeout(()=>{fireMeteor();ml()},d)}
  addEventListener('resize',rs);rs();requestAnimationFrame(dr);ml();
}

// Ripple effect on interactive elements
document.addEventListener('click',e=>{
  const btn=e.target.closest('button,.choice-btn,.ts-choice,.hc-choice,.mg-card,.world-card,.w-card,.wd-travel,.quiz-btn');
  if(!btn||btn.disabled)return;
  const rect=btn.getBoundingClientRect();
  const sz=Math.max(rect.width,rect.height);
  const r=document.createElement('span');r.className='ripple';
  r.style.width=r.style.height=sz+'px';
  r.style.left=(e.clientX-rect.left-sz/2)+'px';
  r.style.top=(e.clientY-rect.top-sz/2)+'px';
  btn.appendChild(r);
  setTimeout(()=>r.remove(),600);
});

// Tab switching with smooth entrance
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>{
      c.classList.remove('active');
      c.style.animation='none';
      void c.offsetHeight; // reflow hack
    });
    btn.classList.add('active');
    const tc=document.getElementById('tab-'+btn.dataset.tab);
    tc.classList.add('active');
    tc.style.animation='';
  });
});

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(r>w/2)r=w/2;if(r>h/2)r=h/2;this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this}
}

function showWorkDetail(idx){
  const w=WORKS_DATA[idx],d=PLAY_DETAILS[w.t];
  document.getElementById('worksScroll').style.display='none';
  const dv=document.getElementById('workDetail');dv.style.display='block';
  if(!d){dv.innerHTML=`<button class="mg-back" onclick="backToWorks()">&#9664; 返回</button><div class="hc-scene"><div class="hc-title">${w.t}</div><div class="hc-text">${w.d}</div></div>`;return}
  const tp={tragedy:'悲剧',comedy:'喜剧',history:'历史剧'}[w.y]||'';
  dv.innerHTML=`<button class="mg-back" onclick="backToWorks()">&#9664; 返回</button>
    <div class="work-detail"><span class="wb ${w.y}">${tp}</span>
    <div class="wd-title">${w.t} <span class="wd-en">${w.e} · ${w.yr}</span></div>
    <div class="wd-chars">${d.chars.map(c=>`<span class="wd-char">${c}</span>`).join('')}</div>
    <div class="wd-intro">${d.intro}</div>
    <div class="wd-quote">"${d.q||''}"<span class="wd-qx">${d.qx||''}</span></div>
    <button class="wd-travel" onclick="travelToPlay(${idx})">&#128640; 穿越到「${w.t}」的世界</button></div>`;
}

function backToWorks(){
  document.getElementById('worksScroll').style.display='';
  document.getElementById('workDetail').style.display='none';
  document.getElementById('travelArea').style.display='none';
}

function travelToPlay(idx){
  const w=WORKS_DATA[idx],d=PLAY_DETAILS[w.t];
  if(!d)return;
  document.getElementById('workDetail').style.display='none';
  const ta=document.getElementById('travelArea');ta.style.display='block';
  ta.innerHTML=`<button class="mg-back" onclick="backToDetail(${idx})">&#9664; 返回简介</button>
    <div class="travel-scene"><div class="ts-bg">${d.bg}</div><div class="ts-npc">${d.npc}</div>
    <div class="ts-line">"${d.line}"</div><div class="ts-divider"></div><div id="travelGame"></div></div>`;
  const tg=document.getElementById('travelGame');
  if(d.game.type==='choice')renderTravelChoice(d,tg);
  else if(d.game.type==='find')renderTravelFind(d,tg);
  else if(d.game.type==='order')renderTravelOrder(d,tg);
}
function backToDetail(idx){showWorkDetail(idx)}

function renderTravelChoice(d,cont){
  const g=d.game;
  cont.innerHTML=`<div class="ts-scene">${g.scene}</div>
    <div class="ts-choices">${g.c.map((_,i)=>`<button class="ts-choice" data-i="${i}">${g.c[i].t}</button>`).join('')}</div>
    <div id="tsFB"></div>`;
  cont.querySelectorAll('.ts-choice').forEach(b=>{b.onclick=()=>{
    if(cont.querySelector('.hc-result'))return;
    cont.querySelectorAll('.ts-choice').forEach(x=>x.disabled=true);
    const fb=document.getElementById('tsFB'),ci=parseInt(b.dataset.i);
    fb.innerHTML=`<div class="hc-result show ${g.c[ci].e}">${g.c[ci].r}</div>`;
    if(g.c[ci].e!=='bad')unlock('&#127917;','穿越抉择','你在一部莎翁剧中做出了关键选择！');
    const btn=document.createElement('button');btn.className='mg-back';btn.style.marginTop='8px';btn.textContent='继续探索 →';btn.onclick=()=>renderTravelQuiz(d,cont);fb.appendChild(btn);
  }});
}

function renderTravelFind(d,cont){
  const g=d.game;let found=0,total=g.items.filter(x=>x.ok).length;
  cont.innerHTML=`<div class="ts-scene">${g.scene}</div>
    <div class="find-grid">${g.items.map((_,i)=>`<div class="find-item" data-i="${i}">${g.items[i].e}<span>${g.items[i].n}</span></div>`).join('')}</div>
    <div class="ts-tip">${g.tip||''}</div><div id="tsFB"></div>`;
  cont.querySelectorAll('.find-item').forEach(el=>{el.onclick=()=>{
    if(cont.querySelector('.hc-result'))return;
    if(el.classList.contains('found'))return;
    const i=parseInt(el.dataset.i);
    if(g.items[i].ok){el.classList.add('found');el.style.borderColor='#4caf50';el.style.background='rgba(76,175,80,.08)';found++;
      if(found>=total){const fb=document.getElementById('tsFB');fb.innerHTML='<div class="hc-result show good">✅ 全部找对了！你太了解这部剧了！</div>';unlock('&#127917;','探索达人','成功找出了剧中的所有关键线索！');const btn=document.createElement('button');btn.className='mg-back';btn.style.marginTop='8px';btn.textContent='继续探索 →';btn.onclick=()=>renderTravelQuiz(d,cont);fb.appendChild(btn)}
    }else{el.style.borderColor='#c76b5a';el.style.background='rgba(199,107,90,.08)';el.onclick=null}
  }});
}

function renderTravelOrder(d,cont){
  const g=d.game,items=shuffle([...g.items]);let next=1;
  cont.innerHTML=`<div class="ts-scene">${g.scene}</div>
    <div class="order-tip">${g.tip||''}</div>
    <div class="order-area">${items.map((_,i)=>`<div class="order-item" data-i="${i}">${items[i].t}</div>`).join('')}</div><div id="tsFB"></div>`;
  cont.querySelectorAll('.order-item').forEach(el=>{el.onclick=()=>{
    if(cont.querySelector('.hc-result'))return;
    if(el.classList.contains('placed'))return;
    const i=parseInt(el.dataset.i),it=items[i];
    if(it.ord===next){el.classList.add('placed');el.textContent=it.ord+'. '+it.t;el.style.borderColor='#4caf50';el.style.background='rgba(76,175,80,.08)';next++;
      if(next>g.items.length){const fb=document.getElementById('tsFB');fb.innerHTML='<div class="hc-result show good">✅ 完全正确！你对剧情了如指掌！</div>';unlock('&#127917;','剧情大师','准确还原了故事的时间顺序！');const btn=document.createElement('button');btn.className='mg-back';btn.style.marginTop='8px';btn.textContent='继续探索 →';btn.onclick=()=>renderTravelQuiz(d,cont);fb.appendChild(btn)}
    }else{el.style.borderColor='#c76b5a';el.style.background='rgba(199,107,90,.08)';el.onclick=null}
  }});
}

function renderTravelQuiz(d,cont){
  const qs=d.quiz||[];let qi=0,score=0;
  cont.innerHTML=`<div class="ts-divider"></div><div style="text-align:center;color:var(--accent2);font-size:.82em;margin:4px 0">&#129518; 剧情小测验</div><div id="quizArea"></div>`;
  const qa=document.getElementById('quizArea');show();
  function show(){
    if(qi>=qs.length){
      qa.innerHTML=`<div class="hc-result show ${score===qs.length?'good':'neutral'}"><strong>📊 答对 ${score}/${qs.length}</strong>${score===qs.length?' 满分！莎翁专家！':score>=2?' 不错哦～':' 再读读剧情吧！'}</div>`;
      unlock('&#127942;','穿越体验','你完整探索了一部莎翁名剧！');return;
    }
    const q=qs[qi];
    qa.innerHTML=`<div style="font-size:.76em;color:var(--text);margin:6px 0;line-height:1.5">${qi+1}. ${q.s}</div>
      <div style="display:flex;gap:10px;justify-content:center;margin:4px 0">
        <button class="quiz-btn" data-v="1">✅ 是</button>
        <button class="quiz-btn" data-v="0">❌ 否</button></div>
      <div id="qFB"></div>`;
    qa.querySelectorAll('.quiz-btn').forEach(b=>{b.onclick=()=>{
      if(qa.querySelector('.hc-result'))return;
      qa.querySelectorAll('.quiz-btn').forEach(x=>x.disabled=true);
      const ok=(b.dataset.v==='1')===q.a;
      if(ok)score++;
      document.getElementById('qFB').innerHTML=`<div class="hc-result show ${ok?'good':'bad'}">${ok?'✅ 答对了！':'❌ 正确答案：'+(q.a?'是':'否')}</div>`;
      qi++;setTimeout(show,1200);
    }});
  }
}
